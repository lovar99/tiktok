<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونە ژوورەوە - داشبۆردی تیکتۆک</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        .login-box { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #333;
            text-align: center;
        }

        h1 { color: #fe2c55; margin-top: 0; font-size: 26px; }

        .tabs { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .tab { flex: 1; cursor: pointer; font-size: 16px; font-weight: bold; color: #888; transition: 0.3s; }
        .tab.active { color: #fe2c55; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #fe2c55; }

        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            border: none; 
            background: #fe2c55; 
            color: white; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        button:hover { background: #e0274b; }

        #statusMessage { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; }
        .error { color: #ff4c4c; }
        .success { color: #4CAF50; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🏆 داشبۆردی تیکتۆک</h1>
        
        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">چوونە ژوورەوە</div>
            <div class="tab" id="tabSignup" onclick="switchTab('signup')">دروستکردنی هەژمار</div>
        </div>

        <input type="text" id="username" placeholder="ناوی بەکارهێنەر (بێ بۆشایی)" oninput="this.value = this.value.toLowerCase().replace(/\\s/g, '')" />
        <input type="password" id="password" placeholder="وشەی نهێنی" />
        
        <button id="submitBtn" onclick="submitForm()">چوونە ژوورەوە</button>
        
        <div id="statusMessage"></div>
    </div>

    <script>
        let currentMode = 'login';
        
        // This is the address of your Render backend
        const API_URL = "https://tiktok-live-tracker-idnb.onrender.com/api/auth";

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('statusMessage').innerText = "";
            
            if (mode === 'login') {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabSignup').classList.remove('active');
                document.getElementById('submitBtn').innerText = "چوونە ژوورەوە";
            } else {
                document.getElementById('tabSignup').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('submitBtn').innerText = "دروستکردنی هەژمار";
            }
        }

        async function submitForm() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const msgBox = document.getElementById('statusMessage');

            if (!user || !pass) {
                msgBox.className = "error";
                msgBox.innerText = "⚠️ تکایە هەموو زانیارییەکان پڕبکەرەوە!";
                return;
            }

            msgBox.className = "";
            msgBox.style.color = "#aaa";
            msgBox.innerText = "⏳ تکایە چاوەڕێ بکە...";

            try {
                // Phase 2: This will talk to your Render server, which talks to Cloudflare D1
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: currentMode, username: user, password: pass })
                });

                const result = await response.json();

                if (response.ok) {
                    msgBox.className = "success";
                    msgBox.innerText = result.message || "✅ سەرکەوتوو بوو! دەچیتە ژوورەوە...";
                    
                    // Save the secret token to the browser and open the dashboard
                    localStorage.setItem("tiktokAdminToken", result.token);
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 1500);
                } else {
                    msgBox.className = "error";
                    msgBox.innerText = "❌ " + (result.error || "هەڵەیەک ڕوویدا!");
                }
            } catch (error) {
                msgBox.className = "error";
                msgBox.innerText = "❌ ناتوانرێت پەیوەندی بە سێرڤەرەوە بکرێت. ئایا سێرڤەرەکە کار دەکات؟";
            }
        }
    </script>
</body>
</html>
