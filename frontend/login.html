<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونە ژوورەوە - داشبۆردی تیکتۆک</title>
    <style>
        body { 
            background: radial-gradient(circle at top right, #1a0b12, #0B0F19);
            color: #F3F4F6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .login-box { 
            background: rgba(26, 31, 44, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 { color: #FF3B5C; margin-top: 0; font-size: 26px; text-shadow: 0 2px 10px rgba(255, 59, 92, 0.3); }

        .tabs { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .tab { flex: 1; cursor: pointer; font-size: 16px; font-weight: 600; color: #6B7280; transition: all 0.3s ease; }
        .tab.active { color: #F3F4F6; text-shadow: 0 0 10px rgba(255,255,255,0.2); border-bottom: 2px solid #FF3B5C; margin-bottom: -11px; padding-bottom: 9px; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.2); 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus { border-color: #FF3B5C; box-shadow: 0 0 0 3px rgba(255, 59, 92, 0.15); }

        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(135deg, #FF3B5C 0%, #D80032 100%);
            color: white; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(255, 59, 92, 0.3);
            transition: all 0.3s ease; 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 59, 92, 0.5); }
        button:active { transform: translateY(1px); }

        #statusMessage { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; transition: 0.3s; }
        .error { color: #ff4c4c; }
        .success { color: #10B981; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🏆 داشبۆردی تیکتۆک</h1>
        
        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">چوونە ژوورەوە</div>
            <div class="tab" id="tabSignup" onclick="switchTab('signup')">دروستکردنی هەژمار</div>
        </div>

        <input type="text" id="username" placeholder="ناوی بەکارهێنەر (بێ بۆشایی)" aria-label="ناوی بەکارهێنەر" oninput="this.value = this.value.toLowerCase().replace(/\s/g, '')" />
        <input type="password" id="password" placeholder="وشەی نهێنی" aria-label="وشەی نهێنی" />
        
        <button id="submitBtn" onclick="submitForm()">چوونە ژوورەوە</button>
        
        <div id="statusMessage"></div>
    </div>

    <script>
        let currentMode = 'login';
        
        // This is the address of your Render backend
        const API_URL = "https://tiktok-live-tracker-idnb.onrender.com/api/auth";

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('statusMessage').innerText = "";
            
            if (mode === 'login') {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabSignup').classList.remove('active');
                document.getElementById('submitBtn').innerText = "چوونە ژوورەوە";
            } else {
                document.getElementById('tabSignup').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('submitBtn').innerText = "دروستکردنی هەژمار";
            }
        }

        async function submitForm() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const msgBox = document.getElementById('statusMessage');

            if (!user || !pass) {
                msgBox.className = "error";
                msgBox.innerText = "⚠️ تکایە هەموو زانیارییەکان پڕبکەرەوە!";
                return;
            }

            msgBox.className = "";
            msgBox.style.color = "#aaa";
            msgBox.innerText = "⏳ تکایە چاوەڕێ بکە...";

            try {
                // Phase 2: This will talk to your Render server, which talks to Cloudflare D1
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: currentMode, username: user, password: pass })
                });

                const result = await response.json();

                if (response.ok) {
                    msgBox.className = "success";
                    msgBox.innerText = result.message || "✅ سەرکەوتوو بوو! دەچیتە ژوورەوە...";
                    
                    // Save the secret token to the browser and open the dashboard
                    localStorage.setItem("tiktokAdminToken", result.token);
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 1500);
                } else {
                    msgBox.className = "error";
                    msgBox.innerText = "❌ " + (result.error || "هەڵەیەک ڕوویدا");
                }
            } catch (error) {
                msgBox.className = "error";
                msgBox.innerText = "❌ نەتوانرا پەیوەندی بە سێرڤەرەوە بکرێت. دڵنیابە لە ئینتەرنێتەکەت.";
            }
        }

        // Add Enter key support
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                submitForm();
            }
        });
    </script>
</body>
</html>
