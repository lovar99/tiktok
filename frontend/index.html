<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        html { min-height: 100vh; background-color: #121212; transition: background 0.3s; }
        html.camera-active { background-color: transparent !important; }
        
        body { background-color: transparent; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; overflow-x: hidden; }
        
        #cameraBg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -100; opacity: 0; visibility: hidden; transition: opacity 0.5s; pointer-events: none; }
        html.camera-active #cameraBg { opacity: 1; visibility: visible; }
        
        .stats-header, .controls, .history-container, #visualAlert { position: relative; z-index: 10; background: rgba(30, 30, 30, 0.7) !important; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Side Menu Swiper */
        .glass-panel { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border-left: 1px solid rgba(255,255,255,0.1); }
        #sideMenu { position: fixed; right: -280px; top: 0; width: 280px; height: 100vh; z-index: 4000 !important; transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1); padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; box-shadow: -5px 0 25px rgba(0,0,0,0.7); }
        #sideMenu.open { right: 0; }
        .menu-toggle { position: absolute; left: -50px; top: 50%; transform: translateY(-50%); width: 50px; height: 60px; background: #fe2c55; border-radius: 12px 0 0 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 28px; box-shadow: -2px 2px 8px rgba(0,0,0,0.5); color: white; transition: 0.2s; }
        .menu-toggle:hover { width: 60px; left: -60px; }
        .menu-btn { padding: 15px; background: rgba(40,40,40,0.8); border: 1px solid #555; color: white; border-radius: 8px; cursor: pointer; text-align: right; transition: 0.2s; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .menu-btn:hover { background: #fe2c55; border-color: #fe2c55; }

        /* Premium Draggable Widgets */
        .widget-card { position: absolute; display: flex; flex-direction: column; background: rgba(18, 20, 28, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08); min-width: 250px; min-height: 200px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); z-index: 100; transition: box-shadow 0.2s ease, transform 0.2s ease, opacity 0.2s ease; }
        .widget-card.is-dragging { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 59, 92, 0.5); opacity: 0.95; z-index: 9999 !important; }
        .widget-header { background: rgba(255, 255, 255, 0.03); padding: 12px 16px; cursor: grab; font-weight: 600; color: #F3F4F6; display: flex; justify-content: space-between; align-items: center; user-select: none; touch-action: none; border-radius: 16px 16px 0 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 15px; }
        .widget-header:active { cursor: grabbing; }
        .widget-header > span:first-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-left: 10px; text-shadow: 0 0 8px rgba(255,255,255,0.2); }
        .widget-header > div { flex-shrink: 0; }
        .widget-content { padding: 15px; overflow-y: auto; overflow-x: hidden; flex-grow: 1; height: calc(100% - 50px); }
        .widget-content::-webkit-scrollbar { width: 6px; }
        .widget-content::-webkit-scrollbar-track { background: transparent; }
        .widget-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .widget-content::-webkit-scrollbar-thumb:hover { background: #FF3B5C; }
        .resize-handle { position: absolute; bottom: 0; left: 0; width: 36px; height: 36px; cursor: nwse-resize; z-index: 100; background: transparent; touch-action: none; }
        .resize-handle::after { content: ''; position: absolute; bottom: 8px; left: 8px; width: 14px; height: 14px; border-bottom: 3px solid rgba(255, 255, 255, 0.4); border-left: 3px solid rgba(255, 255, 255, 0.4); border-bottom-left-radius: 4px; transition: border-color 0.2s; }
        .resize-handle:hover::after, .resize-handle:active::after { border-color: #FF3B5C; }
        .widget-close { width: 28px; height: 28px; border-radius: 8px; background: rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; font-size: 14px; color: #9CA3AF; transition: all 0.2s ease; cursor: pointer; }
        .widget-close:hover { background: rgba(255, 59, 92, 0.2); color: #FF3B5C; }
        
        .stats-header { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; width: 95%; max-width: 1400px; }
        .badge { background: #1e1e1e; padding: 12px 25px; border-radius: 30px; font-size: 18px; font-weight: bold; border: 2px solid #333; }
        .badge span { color: #fe2c55; }

        .controls { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 1400px; display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; box-sizing: border-box; }
        .controls input { padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); outline: none; background: rgba(0, 0, 0, 0.2); color: white; font-size: 15px; width: 250px; transition: all 0.3s ease; }
        .controls input:focus { border-color: #FF3B5C; box-shadow: 0 0 0 3px rgba(255, 59, 92, 0.15); }
        .start-btn { padding: 14px 24px; border-radius: 10px; border: none; background: linear-gradient(135deg, #FF3B5C 0%, #D80032 100%); color: white; font-size: 15px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 15px rgba(255, 59, 92, 0.3); transition: all 0.3s ease; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 59, 92, 0.5); }
        .start-btn:active { transform: translateY(1px); }

        /* Item Entrance Animation */
        .item { display: flex; align-items: center; padding: 12px 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; width: 100%; box-sizing: border-box; overflow: hidden; border-left: 3px solid transparent; transition: all 0.3s ease; animation: slideInFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .item:hover { background: rgba(255, 255, 255, 0.08); border-left: 3px solid #FF3B5C; }
        @keyframes slideInFade { 0% { opacity: 0; transform: translateY(15px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

        /* Live Breathing Pulse */
        .live-pulse-dot { width: 10px; height: 10px; background-color: #FF3B5C; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #FF3B5C; animation: breathingGlow 2s infinite ease-in-out; vertical-align: middle; margin-left: 5px; }
        @keyframes breathingGlow { 0% { transform: scale(0.8); opacity: 0.8; box-shadow: 0 0 0px rgba(255,59,92, 0.2); } 50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px rgba(255,59,92, 0.6); } 100% { transform: scale(0.8); opacity: 0.8; box-shadow: 0 0 0px rgba(255,59,92, 0.2); } }
        
        .save-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #4CAF50; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-left: auto; }
        .save-btn:hover { background: #45a049; }
        
        .stop-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #444; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .stop-btn:hover { background: #ff4c4c; }
        
        #statusMessage { font-weight: bold; margin-left: 15px; color: #aaa; flex-grow: 1; }

        .history-container { width: 95%; max-width: 1400px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .history-tag { background: #2a2a2a; padding: 8px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid #444; }
        .history-tag .name { cursor: pointer; color: #ccc; font-weight: bold; }
        .history-tag .name:hover { color: #fe2c55; }
        .history-tag .delete { cursor: pointer; color: #666; font-size: 14px; font-weight: bold; }
        .history-tag .delete:hover { color: #ff4c4c; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 95%; max-width: 1400px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn:hover { background: #444; }
        .tab-btn.active { background: #fe2c55; }
        
        .tab-content { display: none; width: 95%; max-width: 1400px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-sizing: border-box; }
        .tab-content.active { display: block; }
        h2 { color: #fe2c55; text-align: center; margin-top: 0; font-size: 28px; margin-bottom: 25px; }

        .grid-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .item { display: flex; align-items: center; padding: 10px; background: #2a2a2a; border-radius: 8px; width: 100%; box-sizing: border-box; overflow: hidden; }
        .rank { font-size: 22px; width: 35px; text-align: center; margin-right: 10px; flex-shrink: 0; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; border: 2px solid #444; flex-shrink: 0; }
        .name { font-size: 16px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .count { background: #fe2c55; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 15px; flex-shrink: 0; margin-right: 5px; }

        .search-bar { width: 100%; padding: 15px; border-radius: 8px; border: none; outline: none; background: #2a2a2a; color: white; font-size: 18px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #444; }
        .comment-item { display: flex; align-items: flex-start; padding: 15px; background: #2a2a2a; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; transition: all 0.3s ease; }
        .comment-smooth-enter { opacity: 0; transform: translateY(-20px); }
        .comment-smooth-enter-active { opacity: 1; transform: translateY(0); }
        .comment-text { display: flex; flex-direction: column; width: 100%; }
        .comment-name { display: flex; align-items: center; font-weight: bold; color: #fe2c55; font-size: 16px; flex-wrap: wrap; }
        
        #searchList { max-height: 600px; overflow-y: auto; padding-right: 10px; }
        #searchList::-webkit-scrollbar { width: 8px; }
        #searchList::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 4px; }
        #searchList::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        #searchList::-webkit-scrollbar-thumb:hover { background: #fe2c55; }

        /* 📱 NEW: Mobile Smartphone Responsive Layout */
        @media (max-width: 800px) {
            .grid-list { grid-template-columns: repeat(2, 1fr); }
            .controls { flex-direction: column; align-items: stretch; }
            .controls input, .controls button { width: 100%; margin: 5px 0; box-sizing: border-box; }
            .save-btn { margin-left: 0; }
            #statusMessage { margin: 10px 0; text-align: center; }
        }
        
        @media (max-width: 768px) and (orientation: portrait) {
            .grid-list { grid-template-columns: 1fr; }
            .stats-header { flex-direction: column; align-items: stretch; width: 100%; }
            .badge { text-align: center; width: 100%; box-sizing: border-box; }
            .tabs { flex-direction: column; width: 100%; }
            .tab-btn { width: 100%; }
            .tab-content { padding: 15px; }
            h2 { font-size: 22px; }
            .comment-name { flex-direction: column; align-items: flex-start; }
            .comment-name span:last-child { margin-left: 0 !important; margin-top: 5px; }
            .widget-card { max-width: 95vw !important; max-height: 80vh !important; }
        }

        /* 📱 SMARTPHONE LANDSCAPE (STREAMER MODE) */
        @media (max-height: 600px) and (orientation: landscape) {
            .widget-card { max-height: 90vh !important; }
            .widget-header { padding: 8px 12px; font-size: 14px; }
            .item { padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <!-- Camera Background for Mobile Screen-sharing -->
    <video id="cameraBg" autoplay playsinline muted></video>

    <!-- Floating Button to Toggle Controls -->
    <div class="fab-menu" onclick="toggleWidget('widget-controls')" title="کردنەوەی کۆنتڕۆڵەکان">⚙️</div>

    <style>
        .poll-item { background: #1e1e1e; padding: 6px 12px; border-radius: 8px; font-weight: bold; border: 1px solid #fe2c55; display: flex; align-items: center; }
        .poll-item span { color: #fe2c55; margin-left: 10px; font-size: 16px; }
        
        .fab-menu { position: fixed; bottom: 20px; left: 20px; background: #fe2c55; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 2000; cursor: pointer; border: 2px solid #fff; transition: 0.2s; user-select: none; }
        .fab-menu:active { transform: scale(0.9); }
        /* Original red blocky handle removed for modern HUD design */
        
        .controls-grid { display: flex; flex-direction: column; gap: 8px; }
        .controls-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; width: 100%; }
        .controls-row input, .controls-row button { flex: 1; min-width: 30%; box-sizing: border-box; padding: 10px; font-size: 14px; border-radius: 6px; outline: none; border: none; }
        .controls-row input { background: #2a2a2a; color: white; border: 1px solid #444; }
        .badge { padding: 6px 10px !important; font-size: 13px !important; flex: 1; text-align: center; border-radius: 20px; background: #1e1e1e; border: 1px solid #333; font-weight: bold; }
        .badge span { color: #fe2c55; }

        .widget-btn { cursor: pointer; padding: 2px 10px; background: #333; border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; font-size: 18px; font-weight: bold; color: #fff; transition: 0.2s; user-select: none; }
        .widget-btn:hover { background: #555; border-color: white; }
        .snapped-edge { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important; opacity: 0.7; cursor: pointer; z-index: 9999 !important; }
        .snapped-edge:hover { opacity: 1; }
        
        .mobile-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; height: 100%; width: 100%; -webkit-overflow-scrolling: touch; }
        .mobile-carousel::-webkit-scrollbar { display: none; }
        .carousel-item { scroll-snap-align: start; flex: 0 0 100%; height: 100%; padding: 10px; box-sizing: border-box; overflow-y: auto; }
        .carousel-nav { display: flex; justify-content: center; gap: 8px; padding: 8px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; }
        .carousel-tab { padding: 6px 12px; background: #2b3143; border-radius: 20px; font-size: 13px; cursor: pointer; color: #aaa; border: 1px solid transparent; }
        .carousel-tab.active { background: #ff3b5c; color: white; border-color: rgba(255,255,255,0.3); }

        .widget-header, .resize-handle { touch-action: none; }

        @keyframes greenFlash {
            0% { background-color: rgba(0, 255, 0, 0.4); transform: scale(1.02); }
            100% { background-color: transparent; transform: scale(1); }
        }
        .update-flash {
            animation: greenFlash 0.8s ease-out;
            border-radius: 8px;
        }

        /* Container Queries for Auto-Scaling inside Widgets */
        .widget-content { container-type: inline-size; container-name: widgetbox; }
        
        @container widgetbox (max-width: 320px) {
            .item { padding: 6px; }
            .avatar { width: 35px; height: 35px; margin-right: 8px; }
            .rank { font-size: 16px; width: 25px; margin-right: 5px; }
            .name { font-size: 13px; max-width: 100px; }
            .count { font-size: 13px; padding: 4px 8px; }
        }
        @container widgetbox (max-width: 220px) {
            .item { padding: 4px; }
            .avatar { width: 25px; height: 25px; margin-right: 5px; border-width: 1px; }
            .rank { font-size: 14px; width: 20px; margin-right: 3px; }
            .name { font-size: 11px; max-width: 60px; }
            .count { font-size: 11px; padding: 2px 5px; }
            .comment-item { padding: 8px; }
            .comment-name { font-size: 12px; }
            .comment-name span:nth-child(2) { font-size: 10px; }
            .comment-text span:last-child { font-size: 12px; margin-top: 2px; }
        }

        /* Dashboard Layout */
        #widget-controls { position: fixed; top: 20px; right: 20px; z-index: 3000 !important; height: auto !important; min-height: unset !important; }
        .dashboard-grid { width: 100vw; height: 100vh; position: relative; z-index: 50; pointer-events: none; }
        .dashboard-grid > * { pointer-events: auto; }
        
        /* Smooth Comments Animations */
        .comment-smooth-enter { opacity: 0; transform: translateY(-30px) scale(0.95); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .comment-smooth-enter-active { opacity: 1; transform: translateY(0) scale(1); max-height: 200px; margin-bottom: 10px; padding-top: 15px; padding-bottom: 15px; }

        .widget-card.minimized { height: 50px !important; min-height: 50px !important; overflow: hidden; }
        .widget-card.minimized .widget-content { display: none; }
        .widget-card.minimized .resize-handle { display: none; }
        /* 💻 PC/Desktop ONLY Layout Fixes (Prevents massive stretching) */
        @media (min-width: 801px) {
            .controls-row input, .controls-row button {
                flex: 0 1 auto !important;
                min-width: 180px;
                padding: 12px 20px;
            }
            .badge {
                flex: 0 1 auto !important;
                min-width: auto;
                padding: 12px 10px !important;
                font-size: 14px !important;
            }
            /* Keep HUD completely compact on PC */
            #widget-controls { width: 380px !important; }
        }
    </style>
</head>
<body>
    <!-- Camera Background for Mobile Screen-sharing -->
    <video id="cameraBg" autoplay playsinline muted></video>

    <!-- Floating Button to Toggle Controls -->
    <div class="fab-menu" onclick="toggleWidget('widget-controls')" title="کردنەوەی کۆنتڕۆڵەکان">⚙️</div>

    <!-- Main Controls Widget (Ultra-Compact HUD) -->
    <div id="widget-controls" class="widget-card premium-controls" style="display: flex; padding: 5px; z-index: 2000;">
        <div class="widget-header" style="border-bottom: none; padding: 5px 10px;">
            <span id="secretAdminTrigger" style="user-select: none; font-size: 14px;">🏆 کۆنتڕۆڵی لایڤ</span>
            <span class="widget-close" onclick="toggleWidget('widget-controls')" style="width: 24px; height: 24px; font-size: 12px;">✖</span>
        </div>
        <div class="widget-content controls-grid" style="padding: 5px; overflow: hidden; display: flex; flex-direction: column; gap: 8px;">
            
            <div style="display: flex; gap: 5px;">
                <input type="text" id="usernameInput" placeholder="ناوی تیکتۆک..." oninput="this.value = this.value.toLowerCase().replace(/@/g, '').trim()" style="flex: 1; padding: 8px 12px; font-size: 14px; margin: 0; min-width: 0;" />
                <button class="start-btn" onclick="startStream()" style="padding: 8px 15px; font-size: 14px; margin: 0; white-space: nowrap;">دەستپێکردن</button>
                <button class="stop-btn" onclick="stopStream()" style="padding: 8px 15px; font-size: 14px; margin: 0; white-space: nowrap; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">وەستان</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <div class="badge" onclick="fetchAllUsers()" style="cursor: pointer; margin: 0; padding: 6px 2px !important; font-size: 12px !important; white-space: nowrap; overflow: hidden;" title="هەموو بەکارهێنەران">👥 <span id="trackedUsersBadge">0</span></div>
                <div class="badge" style="margin: 0; padding: 6px 2px !important; font-size: 12px !important; white-space: nowrap; overflow: hidden;"><span class="live-pulse-dot" style="width:8px;height:8px;margin:0 2px;"></span> <span id="liveViewersBadge">0</span></div>
                <div class="badge" style="margin: 0; padding: 6px 2px !important; font-size: 12px !important; white-space: nowrap; overflow: hidden;">💬 <span id="totalCommentsBadge">0</span></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="start-btn" style="background: #ff9800; padding: 8px; font-size: 12px;" id="liveModeBtn" onclick="toggleLiveMode()">📺 لایڤ مۆد</button>
                <button class="save-btn" style="background: #00bcd4; color: white; padding: 8px; font-size: 12px; width: 100%; margin: 0;" onclick="autoArrangeWidgets()">📐 ڕێکخستن</button>
                <button class="start-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px; font-size: 12px;" onclick="toggleCamera()">📷 کامێرا</button>
                <button class="start-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px; font-size: 12px;" onclick="switchCamera()">🔄 سوڕاندن</button>
            </div>
            
            <button class="save-btn" onclick="saveDashboardHTML()" style="background: #10B981; padding: 8px; font-size: 12px; width: 100%; margin: 0;">💾 پاشەکەوت</button>

            <div style="text-align: center;">
                <span id="statusMessage" style="font-size: 12px; color: #aaa;">چاوەڕێی دەستپێکردن...</span>
            </div>
        </div>
    </div>

    <!-- Side Panel Swiper -->
    <div id="sideMenu" class="glass-panel">
        <div class="menu-toggle" onclick="document.getElementById('sideMenu').classList.toggle('open')">☰</div>
        <h2 style="color: white; margin-top: 0; font-size: 20px; border-bottom: 1px solid #444; padding-bottom: 10px;">ویجێتەکان (Widgets)</h2>
        <button class="menu-btn" onclick="toggleWidget('widget-comments')">💬 کۆمێنتە ڕاستەوخۆکان</button>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Redirect to login page if no token is found
        if (!localStorage.getItem("tiktokAdminToken")) {
            window.location.href = "login.html";
        }
        
        const socket = io("https://tiktok-live-tracker-idnb.onrender.com", { transports: ['websocket'] });
        const maxComments = 300;

        function saveDashboardHTML() {
            const now = new Date();
            const dateStr = now.getFullYear() + "-" + 
                            String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                            String(now.getDate()).padStart(2, '0') + "_" + 
                            String(now.getHours()).padStart(2, '0') + "-" + 
                            String(now.getMinutes()).padStart(2, '0');

            // Force all widgets to display stack-layout to ensure no data is hidden in download
            document.querySelectorAll('.widget-card').forEach(w => {
                w.dataset.oldDisplay = w.style.display;
                w.style.display = 'flex';
                w.style.position = 'relative'; 
                w.style.top = 'auto';
                w.style.left = 'auto';
                w.style.width = '100%';
                w.style.marginBottom = '20px';
            });
            
            const clone = document.documentElement.cloneNode(true);
            const controls = clone.querySelector('.controls');
            if(controls) controls.remove();
            const sideMenu = clone.querySelector('#sideMenu');
            if(sideMenu) sideMenu.remove();
            const cameraBg = clone.querySelector('#cameraBg');
            if(cameraBg) cameraBg.remove();
            
            // Restore actual floating layout
            document.querySelectorAll('.widget-card').forEach(w => {
                w.style.display = w.dataset.oldDisplay;
                w.style.position = 'absolute';
                if (widgetState[w.id]) {
                    w.style.top = widgetState[w.id].top || '250px';
                    w.style.left = widgetState[w.id].left || '50px';
                    w.style.width = widgetState[w.id].width || '350px';
                }
                w.style.marginBottom = '0';
            });

            const htmlContent = "<!DOCTYPE html>\n" + clone.outerHTML;
            const blob = new Blob([htmlContent], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = `Live_Stats_${dateStr}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        let searchHistory = JSON.parse(localStorage.getItem('tiktokSearchHistory') || '[]');

        function getUsernameFromToken() {
            const token = localStorage.getItem("tiktokAdminToken");
            if (!token) return "unknown";
            try { return JSON.parse(atob(token.split('.')[1])).username; } catch(e) { return "unknown"; }
        }

        function saveSettingsToServer() {
            socket.emit("saveUserSettings", { 
                username: getUsernameFromToken(), 
                searchHistory: searchHistory, 
                widgetState: widgetState
            });
        }

        function renderHistory() {
            const container = document.getElementById("historyContainer");
            if (!container) return; // FIX: Prevent crash if element is removed from UI
            if (searchHistory.length === 0) {
                container.innerHTML = "";
                return;
            }
            container.innerHTML = searchHistory.map(username => `
                <div class="history-tag">
                    <span class="name" onclick="loadFromHistory('${username}')">@${username}</span>
                    <span class="delete" onclick="deleteHistory('${username}')">✖</span>
                </div>
            `).join("");
        }

        function saveToHistory(username) {
            searchHistory = searchHistory.filter(u => u !== username);
            searchHistory.unshift(username); 
            renderHistory();
            localStorage.setItem('tiktokSearchHistory', JSON.stringify(searchHistory));
            saveSettingsToServer();
        }

        function deleteHistory(username) {
            searchHistory = searchHistory.filter(u => u !== username);
            renderHistory();
            localStorage.setItem('tiktokSearchHistory', JSON.stringify(searchHistory));
            saveSettingsToServer();
        }

        function loadFromHistory(username) {
            document.getElementById("usernameInput").value = username;
            startStream();
        }

        renderHistory();

        socket.on("connect", () => {
            document.getElementById("statusMessage").innerText = "🟢 ئامادەیە بۆ دەستپێکردن";
            document.getElementById("statusMessage").style.color = "#4cff4c";
            socket.emit("requestInitialState", getUsernameFromToken());
        });

        socket.on("initialState", (data) => {
            if (data.searchHistory) {
                searchHistory = data.searchHistory;
                renderHistory();
            }
            if (data.widgetState) {
                widgetState = data.widgetState;
                initDraggableWidgets(); // Re-apply positions
            }
            
            if (data.isActive && data.currentTrackedUsername) {
                document.getElementById("usernameInput").value = data.currentTrackedUsername;
                document.getElementById("statusMessage").innerText = `✅ پەیوەندی سەرکەوتوو بوو! (Connected) - @${data.currentTrackedUsername}`;
                document.getElementById("statusMessage").style.color = "#00FF00";
                
                if (data.allComments) {
                    allComments = data.allComments;
                    document.getElementById("totalCommentsBadge").innerText = allComments.length.toLocaleString();
                    renderComments();
                }
                if (data.leaderboard) {
                    renderLeaderboardData(data.leaderboard);
                }
                if (data.pollKeywords) {
                    const sorted = Object.keys(data.pollCounts)
                        .sort((a, b) => data.pollCounts[b] - data.pollCounts[a])
                        .slice(0, 3)
                        .map(k => ({ keyword: k, count: data.pollCounts[k] }));
                    // simulate pollUpdate
                    const container = document.getElementById("pollResults");
                    if (container && sorted.length > 0) {
                         container.innerHTML = sorted.map((p, index) => {
                             const rank = index === 0 ? "🥇" : index === 1 ? "🥈" : "🥉";
                             return `<div class="poll-item">${rank} ${p.keyword.toUpperCase()} <span>${p.count}</span></div>`;
                         }).join("");
                    }
                }
            } else {
                document.getElementById("statusMessage").innerText = "چاوەڕێی دەستپێکردن...";
                document.getElementById("statusMessage").style.color = "#aaa";
            }
        });
        
        socket.on("connect_error", (error) => {
            document.getElementById("statusMessage").innerText = "🔴 نەتوانرا پەیوەندی بکرێت، تکایە دووبارە هەوڵبدەرەوە!";
            document.getElementById("statusMessage").style.color = "#ff4c4c";
        });
        
        function addPollField() {
            const container = document.getElementById("pollContainer");
            const div = document.createElement("div");
            div.className = "controls-row poll-input-row";
            div.style.width = "100%";
            div.innerHTML = `
                <input type="text" class="poll-keyword" placeholder="وشەی دەنگدان..." oninput="updatePollKeywords()" style="flex: 1;" />
                <button class="start-btn" style="background: #ff4c4c; min-width: 45px; flex: 0; padding: 10px;" onclick="this.parentElement.remove(); updatePollKeywords();">-</button>
            `;
            container.appendChild(div);
        }

        function updatePollKeywords() {
            const inputs = document.querySelectorAll(".poll-keyword");
            const keywords = Array.from(inputs).map(input => input.value.trim()).filter(k => k !== "");
            socket.emit("setPollKeywords", keywords);
        }

        socket.on("pollUpdate", (sorted) => {
            const container = document.getElementById("pollResults");
            if (!container) return; // Prevent innerHTML error
            if(sorted.length === 0) {
                container.innerHTML = '<span style="color: #aaa; font-size: 12px;">هێشتا دەستی پێنەکردووە...</span>';
                return;
            }
            container.innerHTML = sorted.map((p, index) => {
                const rank = index === 0 ? "🥇" : index === 1 ? "🥈" : "🥉";
                return `<div class="poll-item">${rank} ${p.keyword.toUpperCase()} <span>${p.count}</span></div>`;
            }).join("");
        });

        socket.on("streamStatus", (data) => {
            document.getElementById("statusMessage").innerText = data.message;
            document.getElementById("statusMessage").style.color = data.status === "error" ? "#ff4c4c" : "#4cff4c";
        });

        socket.on("viewerUpdate", (data) => {
            document.getElementById("liveViewersBadge").innerText = data.count.toLocaleString();
        });

        // 📷 Camera Access Logic
        let cameraStream = null;
        let currentFacingMode = 'environment'; // Default to Back Camera

        async function toggleCamera() {
            const videoElement = document.getElementById('cameraBg');
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
                cameraStream = null;
                document.documentElement.classList.remove('camera-active');
                return;
            }
            startCamera();
        }

        async function startCamera() {
            const videoElement = document.getElementById('cameraBg');
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            
            try {
                // Attempt 1: HD
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
            } catch (error1) {
                try {
                    // Attempt 2: Normal Quality
                    cameraStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: currentFacingMode } 
                    });
                } catch (error2) {
                    try {
                        // Attempt 3: Ultimate fallback
                        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    } catch (error3) {
                        alert("❌ نەتوانرا کامێرا بکرێتەوە: " + error3.message);
                        return;
                    }
                }
            }

            if (cameraStream) {
                videoElement.srcObject = cameraStream;
                videoElement.play().catch(e => console.log("Play error:", e));
                document.documentElement.classList.add('camera-active');
                
                // Hardware-level Auto-Focus Injection
                try {
                    const track = cameraStream.getVideoTracks()[0];
                    const capabilities = track.getCapabilities();
                    
                    // If the phone's lens supports continuous autofocus, force it on!
                    if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                        await track.applyConstraints({
                            advanced: [{ focusMode: 'continuous' }]
                        });
                    }
                } catch (err) {
                    console.log("Autofocus not supported by this browser/device.", err);
                }
            }
        }

        function switchCamera() {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            if (cameraStream) {
                startCamera(); // Immediately flip if already on
            }
        }

        let isLiveMode = true;

        function toggleLiveMode() {
            isLiveMode = !isLiveMode;
            if(isLiveMode) {
                document.body.classList.add('live-mode');
                document.getElementById('liveModeBtn').innerText = "🛑 دەرچوون لە لایڤ مۆد";
                // Show camera controls in floating panel by default when entering mode
                document.querySelectorAll('.widget-card').forEach(w => w.style.display = 'flex');
                initDraggableWidgets(); 
            } else {
                document.body.classList.remove('live-mode');
                document.getElementById('liveModeBtn').innerText = "📺 لایڤ مۆد";
                document.querySelectorAll('.widget-card').forEach(w => w.style.display = '');
                // Camera stays on when returning to Standard Mode!
            }
        }


        function zoomWidget(id, dir) {
            const w = document.getElementById(id);
            const content = w.querySelector('.widget-content');
            
            // Get current zoom level (default is 1)
            let currentZoom = parseFloat(content.style.zoom) || 1;
            
            // Increase or decrease zoom by 15% per click
            currentZoom += (dir * 0.15); 
            
            // Clamp zoom so it doesn't get too ridiculously small or large
            currentZoom = Math.max(0.4, Math.min(currentZoom, 2.5)); 
            
            content.style.zoom = currentZoom;
            saveWidgetState();
        }

        function minimizeWidget(id) {
            const w = document.getElementById(id);
            w.classList.toggle('minimized');
            saveWidgetState();
            setTimeout(autoArrangeWidgets, 100); // Reflow grid
        }

        function autoArrangeWidgets() {
            const widgets = Array.from(document.querySelectorAll('.widget-card:not(#widget-controls)')).filter(w => w.style.display !== 'none' && !w.classList.contains('minimized'));
            if (widgets.length === 0) return;

            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const gap = 15;
            
            const controls = document.getElementById('widget-controls');
            const isControlsVisible = controls && controls.style.display !== 'none';
            const controlsRect = isControlsVisible ? controls.getBoundingClientRect() : { left: screenW + gap, bottom: gap, width: 0 };
            
            const sharesWidget = document.getElementById('widget-shares');
            const hasShares = widgets.includes(sharesWidget);
            
            if (screenW > 900) {
                if (hasShares) {
                    const sharesTop = isControlsVisible ? controlsRect.bottom + gap : 20;
                    sharesWidget.style.position = 'absolute';
                    sharesWidget.style.top = `${sharesTop}px`;
                    const sharesW = isControlsVisible ? controlsRect.width : 350;
                    const sharesL = isControlsVisible ? controlsRect.left : (screenW - sharesW - gap);
                    sharesWidget.style.left = `${sharesL}px`;
                    sharesWidget.style.width = `${sharesW}px`;
                    sharesWidget.style.height = `${screenH - sharesTop - 20}px`;
                }
                
                const leftWidgets = widgets.filter(w => w !== sharesWidget);
                if (leftWidgets.length > 0) {
                    const rightBoundary = isControlsVisible ? controlsRect.left : (hasShares ? (screenW - 350 - gap) : screenW);
                    const availableLeft = rightBoundary - gap - 20;
                    
                    const cols = leftWidgets.length;
                    const wW = (availableLeft - (gap * (cols - 1))) / cols;
                    const wH = screenH - 40;
                    
                    const order = ['widget-search', 'widget-gifts', 'widget-likes', 'widget-comments'];
                    leftWidgets.sort((a, b) => {
                        let indexA = order.indexOf(a.id);
                        let indexB = order.indexOf(b.id);
                        if (indexA === -1) indexA = 99;
                        if (indexB === -1) indexB = 99;
                        return indexA - indexB;
                    });
                    
                    leftWidgets.forEach((w, i) => {
                        w.style.position = 'absolute';
                        w.style.width = `${wW}px`;
                        w.style.height = `${wH}px`;
                        w.style.left = `${20 + (i * (wW + gap))}px`;
                        w.style.top = `20px`;
                    });
                }
            } else {
                let startTop = isControlsVisible ? controlsRect.bottom + gap : 20;
                let availableW = screenW - 40;
                
                let cols = widgets.length >= 4 ? 2 : 1;
                let rows = Math.ceil(widgets.length / cols);
                
                const wW = (availableW - (gap * (cols - 1))) / cols;
                const wH = (screenH - startTop - 20 - (gap * (rows - 1))) / rows;
                
                widgets.forEach((w, i) => {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    w.style.position = 'absolute';
                    w.style.width = `${wW}px`;
                    w.style.height = `${wH}px`;
                    w.style.left = `${20 + (col * (wW + gap))}px`;
                    w.style.top = `${startTop + (row * (wH + gap))}px`;
                });
            }
            saveWidgetState();
        }

        // 🖱️ Draggable & Resizable Widget Logic
        let widgetState = JSON.parse(localStorage.getItem('tiktokWidgetState') || '{}');

        function saveWidgetState() {
            document.querySelectorAll('.widget-card').forEach(widget => {
                const content = widget.querySelector('.widget-content');
                widgetState[widget.id] = {
                    display: widget.style.display,
                    top: widget.style.top,
                    left: widget.style.left,
                    width: widget.style.width,
                    height: widget.style.height,
                    zoom: content ? (parseFloat(content.style.zoom) || 1) : 1,
                    minimized: widget.classList.contains("minimized")
                };
            });
            localStorage.setItem('tiktokWidgetState', JSON.stringify(widgetState));
        }

        function toggleWidget(id) {
            const w = document.getElementById(id);
            if(w.style.display === 'flex') {
                w.style.display = 'none';
            } else {
                w.style.display = 'flex';
                
                // Safe-zone reset: If widget got lost off-screen, bring it back to the top left!
                if (w.style.top === 'auto' || parseInt(w.style.top) < 0 || parseInt(w.style.top) > window.innerHeight) {
                    w.style.top = '100px';
                }
                if (w.style.left === 'auto' || parseInt(w.style.left) < 0 || parseInt(w.style.left) > window.innerWidth) {
                    w.style.left = '20px';
                }
                
                document.querySelectorAll('.widget-card').forEach(card => card.style.zIndex = 100);
                w.style.zIndex = 1000;
                
                // Automatically close the side menu on mobile so you can see the widget!
                document.getElementById('sideMenu').classList.remove('open');
            }
            saveWidgetState();
        }

        function initDraggableWidgets() {
            document.querySelectorAll('.widget-card').forEach(widget => {
                // Restore State from localStorage
                if(widgetState[widget.id]) {
                    // Prevent inline display flex from breaking standard tabs!
                    if(isLiveMode) {
                        widget.style.display = widgetState[widget.id].display === 'none' ? 'none' : 'flex';
                    } else {
                        widget.style.display = ''; 
                    }
                    
                    if(widgetState[widget.id].top) widget.style.top = widgetState[widget.id].top;
                    if(widgetState[widget.id].left) widget.style.left = widgetState[widget.id].left;
                    if(widgetState[widget.id].width) widget.style.width = widgetState[widget.id].width;
                    if(widgetState[widget.id].height) widget.style.height = widgetState[widget.id].height;
                    
                    if(widgetState[widget.id].minimized) widget.classList.add("minimized");
                    
                    if(widgetState[widget.id].zoom) {
                        const content = widget.querySelector('.widget-content');
                        if(content) content.style.zoom = widgetState[widget.id].zoom;
                    }
                } else if (!isLiveMode) {
                    widget.style.display = '';
                }

                const header = widget.querySelector('.widget-header');
                const resizeHandle = widget.querySelector('.resize-handle');
                let isDragging = false, isResizing = false;
                let startX, startY, startLeft, startTop, startWidth, startHeight;

                // Dragging Logic Fixed
                if (header) {
                    header.addEventListener('pointerdown', (e) => {
                        if(e.target.classList.contains('widget-close') || e.target.classList.contains('widget-btn')) return;
                        isDragging = true;
                        widget.classList.add('is-dragging');
                        widget.style.position = 'fixed'; // Float out of CSS grid
                        const rect = widget.getBoundingClientRect();
                        startX = e.clientX; startY = e.clientY;
                        startLeft = rect.left;
                        startTop = rect.top;
                        widget.style.right = 'auto'; // Fixes horizontal drag locking!
                        
                        document.querySelectorAll('.widget-card').forEach(w => w.style.zIndex = 100);
                        widget.style.zIndex = 1000;
                        header.setPointerCapture(e.pointerId);
                    });

                    header.addEventListener('pointermove', (e) => {
                        if(!isDragging) return;
                        widget.style.left = (startLeft + e.clientX - startX) + 'px';
                        widget.style.top = (startTop + e.clientY - startY) + 'px';
                    });

                    header.addEventListener('pointerup', (e) => {
                        isDragging = false;
                        widget.classList.remove('is-dragging'); // Removes HUD physics
                        header.releasePointerCapture(e.pointerId);
                        
                        // Edge Snapping Physics!
                        const rect = widget.getBoundingClientRect();
                        const wW = window.innerWidth;
                        const wH = window.innerHeight;
                        const snapThreshold = rect.width * 0.4; // Must drag 40% off screen to snap
                        
                        // Reset any previous snap state
                        widget.onclick = null;
                        
                        if (rect.left < -snapThreshold) {
                            // Snap to Left Edge
                            widget.style.left = `-${rect.width - 30}px`;
                            widget.classList.add('snapped-edge');
                            widget.onclick = () => { widget.style.left = '20px'; widget.classList.remove('snapped-edge'); widget.onclick = null; saveWidgetState(); };
                        } else if (rect.right > wW + snapThreshold) {
                            // Snap to Right Edge
                            widget.style.left = `${wW - 30}px`;
                            widget.classList.add('snapped-edge');
                            widget.onclick = () => { widget.style.left = `${wW - rect.width - 20}px`; widget.classList.remove('snapped-edge'); widget.onclick = null; saveWidgetState(); };
                        } else if (rect.top < -rect.height * 0.4) {
                            // Snap to Top Edge
                            widget.style.top = `-${rect.height - 30}px`;
                            widget.classList.add('snapped-edge');
                            widget.onclick = () => { widget.style.top = '20px'; widget.classList.remove('snapped-edge'); widget.onclick = null; saveWidgetState(); };
                        } else {
                            widget.classList.remove('snapped-edge');
                        }
                        
                        saveWidgetState();
                    });
                }

                // Resizing Logic (Calculated for Right-To-Left UI)
                if (resizeHandle) {
                    resizeHandle.addEventListener('pointerdown', (e) => {
                        isResizing = true;
                        startX = e.clientX; startY = e.clientY;
                        startWidth = parseInt(window.getComputedStyle(widget).width) || 350;
                        startHeight = parseInt(window.getComputedStyle(widget).height) || 350;
                        
                        document.querySelectorAll('.widget-card').forEach(w => w.style.zIndex = 100);
                        widget.style.zIndex = 1000;
                        resizeHandle.setPointerCapture(e.pointerId);
                        e.stopPropagation();
                    });

                    resizeHandle.addEventListener('pointermove', (e) => {
                        if(!isResizing) return;
                        // Lowered minimum width and height to easily fit mobile screens!
                        widget.style.width = Math.max(120, startWidth + (startX - e.clientX)) + 'px';
                        widget.style.height = Math.max(100, startHeight + (e.clientY - startY)) + 'px';
                    });

                    resizeHandle.addEventListener('pointerup', (e) => {
                        isResizing = false;
                        resizeHandle.releasePointerCapture(e.pointerId);
                        saveWidgetState();
                    });
                }
            });
        }

        function renderList(elementId, users, countField) {
            const validUsers = users.filter(u => u[countField] > 0);
            const containers = [document.getElementById(elementId), document.getElementById("mobile-" + elementId)].filter(Boolean);
            
            if (validUsers.length === 0) { 
                containers.forEach(c => c.innerHTML = ""); 
                return; 
            }

            let userIds = validUsers.map(u => u.uniqueId);

            containers.forEach(container => {
                let currentNodes = Array.from(container.children);
                currentNodes.forEach(node => {
                    if (!userIds.includes(node.getAttribute('data-uid'))) node.remove();
                });

                validUsers.forEach((u, index) => {
                    let node = container.querySelector(`[data-uid="${u.uniqueId}"]`);
                    let countStyle = countField === "likeCount" ? "margin-left: 0;" : "margin-left: auto;";
                    const newCountText = u[countField].toLocaleString();

                    if (!node) {
                        node = document.createElement('div');
                        node.className = 'item update-flash';
                        node.setAttribute('data-uid', u.uniqueId);
                        node.innerHTML = `
                            <div class="rank">${getRankBadge(index)}</div>
                            <img class="avatar" src="${u.profilePictureUrl}" alt="User Avatar" onerror="this.src='https://www.tiktok.com/favicon.ico'">

                            </div>
                            <div class="count" style="${countStyle}">${newCountText}</div>
                        `;
                        container.appendChild(node);
                        if (node.flashTimeout) clearTimeout(node.flashTimeout);
                        node.flashTimeout = setTimeout(() => {
                            node.classList.remove("update-flash");
                        }, 1000);
                    } else {
                        let hasChanged = false;

                        // Just update the inner properties directly, without any CSS flash animations
                        const rankEl = node.querySelector('.rank');
                        if (rankEl && rankEl.innerHTML !== getRankBadge(index).toString()) {
                             rankEl.innerHTML = getRankBadge(index);
                        }

                        const countEl = node.querySelector('.count');
                        if (countEl && countEl.innerText !== newCountText) {
                            countEl.innerText = newCountText;
                            hasChanged = true;
                        }

                        const nameEl = node.querySelector('.name');
                        if (nameEl && nameEl.innerText !== u.nickname) {
                            nameEl.innerText = u.nickname;
                            hasChanged = true;
                        }

                        if (hasChanged) {
                            node.classList.remove("update-flash");
                            void node.offsetWidth; // Trigger reflow
                            node.classList.add("update-flash");
                            if (node.flashTimeout) clearTimeout(node.flashTimeout);
                            node.flashTimeout = setTimeout(() => {
                                node.classList.remove("update-flash");
                            }, 1000);
                        }
                    }

                    if (container.children[index] !== node) container.insertBefore(node, container.children[index]);
                });
            });
        }

            document.getElementById("liveViewersBadge").innerText = "0";
            document.getElementById("trackedUsersBadge").innerText = "0";
            document.getElementById("totalCommentsBadge").innerText = "0";
        }

        
    // Secret 11-Tap Admin Panel Logic
        let tapCount = 0;
        let tapTimer = null;
        document.getElementById("secretAdminTrigger").addEventListener("click", () => {
            tapCount++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000); // Resets if you stop tapping for 2 seconds
            
            if (tapCount >= 11) {
                tapCount = 0;
                socket.emit("requestAdminPanel"); // We will build this in Phase 2
                openModal("⚙️ پەنێڵی بەڕێوەبەر (Admin Panel)", "<p style='text-align:center;'>Loading admin data from server...</p>");
            }
        });

        let adminDataCache = null;
        let hideDuplicateVisits = false;

        socket.on("adminPanelData", (data) => {
            adminDataCache = data;
            renderAdminUI('visits');
        });

        socket.on("adminRefresh", () => {
            socket.emit("requestAdminPanel");
        });

        socket.on("forceLogout", (kickedUsername) => {
            const token = localStorage.getItem("tiktokAdminToken");
            if (token) {
                try {
                    // Read the local token to see who is logged in here
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.username === kickedUsername) {
                        localStorage.removeItem("tiktokAdminToken");
                        alert("⚠️ بەڕێوەبەر تۆی کردە دەرەوە! (Admin kicked you out)");
                        window.location.href = "login.html";
                    }
                } catch (e) {}
            }
        });

        function renderAdminUI(activeTab) {
            if (!adminDataCache) return;
            const { analytics, logins, users, activeCount } = adminDataCache;

            // Analytics Logic
            let visits = analytics;
            if (hideDuplicateVisits) {
                const seen = new Set();
                visits = analytics.filter(v => {
                    if (seen.has(v.ip)) return false;
                    seen.add(v.ip);
                    return true;
                });
            }

            const now = new Date();
            const isToday = d => new Date(d).toDateString() === now.toDateString();
            const isThisWeek = d => (now - new Date(d)) <= 7 * 24 * 60 * 60 * 1000;
            const isThisMonth = d => new Date(d).getMonth() === now.getMonth() && new Date(d).getFullYear() === now.getFullYear();
            const isThisYear = d => new Date(d).getFullYear() === now.getFullYear();

            const todayC = visits.filter(v => isToday(v.time)).length;
            const weekC = visits.filter(v => isThisWeek(v.time)).length;
            const monthC = visits.filter(v => isThisMonth(v.time)).length;
            const yearC = visits.filter(v => isThisYear(v.time)).length;

            let html = `
                <style>
                    .adm-stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
                    .adm-stat { flex: 1; background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #444; min-width: 100px; }
                    .adm-stat b { display: block; font-size: 22px; color: #fe2c55; margin-top: 5px; }
                    .adm-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; flex-wrap: wrap; }
                    .adm-tab { padding: 10px 15px; cursor: pointer; color: #aaa; font-weight: bold; border-radius: 5px; background: #2a2a2a; transition: 0.2s;}
                    .adm-tab:hover { background: #444; }
                    .adm-tab.active { background: #fe2c55; color: white; }
                    .adm-table { width: 100%; border-collapse: collapse; text-align: right; margin-top: 10px; }
                    .adm-table th, .adm-table td { padding: 12px; border-bottom: 1px solid #333; }
                    .adm-table th { background: #2a2a2a; color: #fe2c55; }
                    .adm-btn { padding: 6px 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; margin-left: 5px; transition: 0.2s; }
                    .adm-btn:hover { opacity: 0.8; }
                </style>

                <div class="adm-stats">
                    <div class="adm-stat">لایڤ ئێستا <b>${activeCount}</b></div>
                    <div class="adm-stat">ئەمڕۆ <b>${todayC}</b></div>
                    <div class="adm-stat">ئەم هەفتەیە <b>${weekC}</b></div>
                    <div class="adm-stat">ئەم مانگە <b>${monthC}</b></div>
                    <div class="adm-stat">ئەمساڵ <b>${yearC}</b></div>
                </div>
                
                <div style="margin-bottom: 20px; background: #2a2a2a; padding: 10px; border-radius: 8px; border: 1px solid #444;">
                    <label style="cursor: pointer; color: white; font-size: 15px; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" style="width: 20px; height: 20px;" ${hideDuplicateVisits ? 'checked' : ''} onchange="hideDuplicateVisits=this.checked; renderAdminUI('${activeTab}')"> 
                        شاردنەوەی دووبارەکان (تەنها سەردانە یەکتاکان نیشان بدە)
                    </label>
                </div>

                <div class="adm-tabs">
                    <div class="adm-tab ${activeTab==='visits'?'active':''}" onclick="renderAdminUI('visits')">🌐 مێژووی سەردانەکان</div>
                    <div class="adm-tab ${activeTab==='logins'?'active':''}" onclick="renderAdminUI('logins')">🔐 چوونە ژوورەوەکان</div>
                    <div class="adm-tab ${activeTab==='users'?'active':''}" onclick="renderAdminUI('users')">👥 بەڕێوەبردنی بەکارهێنەران</div>
                </div>
                <div id="admContent" style="max-height: 400px; overflow-y: auto;"></div>
            `;

            document.getElementById("customModalContent").innerHTML = html;
            const contentDiv = document.getElementById("admContent");

            if (activeTab === 'visits') {
                contentDiv.innerHTML = `
                    <table class="adm-table">
                        <tr><th>ئەدرێس</th><th>کات و بەروار</th></tr>
                        ${visits.slice(0, 100).map(v => `<tr><td dir="ltr" style="text-align:right;">${v.ip || 'N/A'}</td><td dir="ltr" style="text-align:right;">${new Date(v.time).toLocaleString()}</td></tr>`).join('')}
                    </table>
                `;
            } 
            else if (activeTab === 'logins') {
                contentDiv.innerHTML = `
                    <table class="adm-table">
                        <tr><th>بەکارهێنەر</th><th>کاتی چوونە ژوورەوە</th><th>زانیاری زیاتر</th></tr>
                        ${logins.map(l => `<tr>
                            <td>${l.user}</td>
                            <td dir="ltr" style="text-align:right;">${new Date(l.time).toLocaleString()}</td>
                            <td><button class="adm-btn" style="background:#2196F3;" onclick="alert('مێژووی چالاکی بەکارهێنەر:\\n\\nناو: ${l.user}\\nکات: ${new Date(l.time).toLocaleString()}\\nمانەوە: ${l.duration ? l.duration + ' خولەک' : 'ئێستا چالاکە'}')">👁️ بینین</button></td>
                        </tr>`).join('')}
                    </table>
                `;
            } 
            else if (activeTab === 'users') {
                contentDiv.innerHTML = `
                    <button class="adm-btn" style="background:#4CAF50; margin-bottom: 15px; padding: 10px 15px;" onclick="addAdminUser()">➕ زیادکردنی بەکارهێنەر</button>
                    <table class="adm-table">
                        <tr><th>ناو</th><th>بەرواری دروستکردن</th><th>کردارەکان</th></tr>
                        ${users.map(u => `
                            <tr>
                                <td>${u.name}</td>
                                <td dir="ltr" style="text-align:right;">${u.joined ? u.joined.split('T')[0] : 'N/A'}</td>
                                <td>
                                    <button class="adm-btn" style="background:#2196F3;" onclick="editAdminUser(${u.uid}, '${u.name}')">دەستکاری</button>
                                    <button class="adm-btn" style="background:#ff9800;" onclick="socket.emit('adminKickUser', '${u.name}')">دەرکردن</button>
                                    <button class="adm-btn" style="background:#f44336;" onclick="if(confirm('دڵنیایت لە سڕینەوەی ${u.name}؟')) socket.emit('adminDeleteUser', ${u.uid})">سڕینەوە</button>
                                </td>
                            </tr>
                        `).join('')}
                    </table>
                `;
            }
        }

        function editAdminUser(uid, oldName) {
            const newName = prompt("ناوی بەکارهێنەری نوێ بنووسە (یان بەتاڵی جێبهێڵە بۆ گۆڕین نەکردنی):", oldName);
            if(newName === null) return; 
            const newPass = prompt("وشەی نهێنی نوێ بنووسە (یان بەتاڵی جێبهێڵە ئەگەر ناتەوێت بیگۆڕیت):");
            if(newPass === null) return; 
            
            const finalName = newName.trim() === "" ? oldName : newName.trim();
            socket.emit("adminEditUser", { uid: uid, newName: finalName, newPass: newPass });
            alert("⏳ داتاکان خەریکە نوێ دەکرێنەوە...");
        }

        function addAdminUser() {
            const user = prompt("ناوی بەکارهێنەری نوێ:");
            if(!user) return;
            const pass = prompt("وشەی نهێنی بۆ بەکارهێنەرەکە:");
            if(!pass) return;
            socket.emit("adminAddUser", { username: user, password: pass });
            alert("⏳ خەریکە دروست دەکرێت... تکایە چەند چرکەیەک چاوەڕێ بکە.");
        }

        // Prevent accidental refresh wiping out data
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = 'Are you sure you want to leave? Your live tracking data will be lost!';
        });

        // Fetch and show Total Tracked Users
        function fetchAllUsers() {
            socket.emit("getAllUsers");
        }

        socket.on("allUsersData", (users) => {
            if(users.length === 0) return openModal("👥 Tracked Users", "<p style='color:#aaa;'>No users tracked yet.</p>");
            
            let html = `<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">` + 
            users.map(u => `
                <div class="item" style="padding: 8px;">
                    <img class="avatar" src="${u.profilePictureUrl}" alt="User Avatar" onerror="this.src='https://www.tiktok.com/favicon.ico'" style="width:40px; height:40px;">
                    <div style="display: flex; flex-direction: column; overflow:hidden;">
                        <span class="name" style="font-size:14px;">${u.nickname}</span>
                        <span style="color: #888; font-size: 12px;">@${u.uniqueId}</span>
                    </div>
                    <span style="margin-left:auto; color:#fe2c55; font-size:12px; font-weight:bold;">🕒 ${u.firstSeen}</span>
                </div>
            `).join("") + `</div>`;
            openModal("👥 All Tracked Users (" + users.length + ")", html);
        });

        // Show Duplicate Comments Modal
        function showDuplicateComments() {
            const counts = {};
            const userMaps = {};
            allComments.forEach(c => {
                const text = c.comment.trim();
                if(text === "💬 [Sent a Sticker or Emote]") return; // Ignore sticker logs
                counts[text] = (counts[text] || 0) + 1;
                if(!userMaps[text]) userMaps[text] = new Set();
                userMaps[text].add("@" + c.uniqueId + " (" + c.nickname + ")");
            });
            
            const duplicates = Object.keys(counts).filter(k => counts[k] > 1).sort((a, b) => counts[b] - counts[a]);
            
            if(duplicates.length === 0) {
                openModal("🔁 Duplicate Comments", "<p style='text-align:center; color:#aaa;'>No duplicate phrases found yet.</p>");
                return;
            }
            
            let html = duplicates.map(text => {
                const usersList = Array.from(userMaps[text]).join("\\n");
                return `
                <div class="comment-item" style="flex-direction: column; cursor: pointer; transition: 0.2s; border: 1px solid transparent;" onmouseover="this.style.borderColor='#fe2c55'" onmouseout="this.style.borderColor='transparent'" onclick="alert('👥 Users who typed this:\\n\\n${usersList.replace(/'/g, "\\'")}')">
                    <div style="display: flex; justify-content: space-between; width: 100%;">
                        <span style="color: white; font-weight: bold; overflow-wrap: anywhere;">"${text}"</span>
                        <span class="count">${counts[text]} times</span>
                    </div>
                    <span style="color: #aaa; font-size: 12px; margin-top: 5px;">👆 Tap to see who typed this</span>
                </div>
                `;
            }).join("");
            
            openModal("🔁 Top Repeated Comments", html);
        }

        // Custom Popup UI Logic
        function openModal(title, contentHtml) {
            let modal = document.getElementById("customModal");
            if(!modal) {
                document.body.insertAdjacentHTML('beforeend', `
                    <div id="customModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;">
                        <div style="background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 900px; max-height: 85vh; overflow-y: auto; border: 2px solid #333; position: relative;">
                            <span onclick="document.getElementById('customModal').style.display='none'" style="position: sticky; float: right; top: 0px; cursor: pointer; font-size: 24px; color: #ff4c4c; font-weight: bold; z-index: 10;">✖</span>
                            <h2 style="margin-top: 0; text-align: left; font-size: 22px; border-bottom: 1px solid #333; padding-bottom: 10px;">${title}</h2>
                            <div id="customModalContent"></div>
                        </div>
                    </div>
                `);
                modal = document.getElementById("customModal");
            }
            document.querySelector("#customModal h2").innerText = title;
            document.getElementById("customModalContent").innerHTML = contentHtml;
            modal.style.display = "flex";
        }
    </script>
</body>
</html>
