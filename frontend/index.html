<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        .stats-header { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; width: 95%; max-width: 1400px; }
        .badge { background: #1e1e1e; padding: 12px 25px; border-radius: 30px; font-size: 18px; font-weight: bold; border: 2px solid #333; }
        .badge span { color: #fe2c55; }

        .controls { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 95%; max-width: 1400px; display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; box-sizing: border-box; }
        .controls input { padding: 12px; border-radius: 8px; border: none; outline: none; background: #2a2a2a; color: white; font-size: 16px; width: 250px; }
        .start-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #fe2c55; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .start-btn:hover { background: #e0274b; }
        
        .save-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #4CAF50; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-left: auto; }
        .save-btn:hover { background: #45a049; }
        
        .stop-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #444; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .stop-btn:hover { background: #ff4c4c; }
        
        #statusMessage { font-weight: bold; margin-left: 15px; color: #aaa; flex-grow: 1; }

        .history-container { width: 95%; max-width: 1400px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .history-tag { background: #2a2a2a; padding: 8px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid #444; }
        .history-tag .name { cursor: pointer; color: #ccc; font-weight: bold; }
        .history-tag .name:hover { color: #fe2c55; }
        .history-tag .delete { cursor: pointer; color: #666; font-size: 14px; font-weight: bold; }
        .history-tag .delete:hover { color: #ff4c4c; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 95%; max-width: 1400px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn:hover { background: #444; }
        .tab-btn.active { background: #fe2c55; }
        
        .tab-content { display: none; width: 95%; max-width: 1400px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-sizing: border-box; }
        .tab-content.active { display: block; }
        h2 { color: #fe2c55; text-align: center; margin-top: 0; font-size: 28px; margin-bottom: 25px; }

        .grid-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .item { display: flex; align-items: center; padding: 10px; background: #2a2a2a; border-radius: 8px; }
        .rank { font-size: 22px; width: 35px; text-align: center; margin-right: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; border: 2px solid #444; flex-shrink: 0; }
        .name { font-size: 16px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .count { background: #fe2c55; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 15px; }

        .search-bar { width: 100%; padding: 15px; border-radius: 8px; border: none; outline: none; background: #2a2a2a; color: white; font-size: 18px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #444; }
        .comment-item { display: flex; align-items: flex-start; padding: 15px; background: #2a2a2a; border-radius: 8px; margin-bottom: 10px; }
        .comment-text { display: flex; flex-direction: column; width: 100%; }
        .comment-name { display: flex; align-items: center; font-weight: bold; color: #fe2c55; font-size: 16px; flex-wrap: wrap; }
        
        #searchList { max-height: 600px; overflow-y: auto; padding-right: 10px; }
        #searchList::-webkit-scrollbar { width: 8px; }
        #searchList::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 4px; }
        #searchList::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        #searchList::-webkit-scrollbar-thumb:hover { background: #fe2c55; }

        /* 📱 NEW: Mobile Smartphone Responsive Layout */
        @media (max-width: 800px) {
            .grid-list { grid-template-columns: repeat(2, 1fr); }
            .controls { flex-direction: column; align-items: stretch; }
            .controls input, .controls button { width: 100%; margin: 5px 0; box-sizing: border-box; }
            .save-btn { margin-left: 0; }
            #statusMessage { margin: 10px 0; text-align: center; }
        }
        
        @media (max-width: 600px) {
            .grid-list { grid-template-columns: 1fr; }
            .stats-header { flex-direction: column; align-items: stretch; width: 100%; }
            .badge { text-align: center; width: 100%; box-sizing: border-box; }
            .tabs { flex-direction: column; width: 100%; }
            .tab-btn { width: 100%; }
            .tab-content { padding: 15px; }
            h2 { font-size: 22px; }
            .comment-name { flex-direction: column; align-items: flex-start; }
            .comment-name span:last-child { margin-left: 0 !important; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <!-- 11-Tap Secret Trigger added to the H1 -->
    <h1 id="secretAdminTrigger" style="user-select: none;">🏆 داشبۆردی ئامارەکانی لایڤ</h1>

    <div class="stats-header">
        <div class="badge" onclick="fetchAllUsers()" style="cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='#444'" onmouseout="this.style.background='#1e1e1e'" title="بینینی هەموو بەکارهێنەران">👥 بەکارهێنەرە تۆمارکراوەکان: <span id="trackedUsersBadge">0</span></div>
        <div class="badge">🔴 بینەرانی لایڤ: <span id="liveViewersBadge">0</span></div>
        <div class="badge">💬 گشتی کۆمێنتەکان: <span id="totalCommentsBadge">0</span></div>
    </div>
    
    <div class="controls" id="dashboardControls">
        <input type="text" id="usernameInput" placeholder="ناوی بەکارهێنەری تیکتۆک بنووسە..." oninput="this.value = this.value.toLowerCase().replace(/@/g, '').trim()" />
        <button class="start-btn" onclick="startStream()">دەستپێکردنی چاودێری</button>
        <span id="statusMessage">چاوەڕێی دەستپێکردن...</span>
        <button class="save-btn" onclick="saveDashboardHTML()">💾 پاشەکەوتکردنی داشبۆرد</button>
    </div>

    <div id="historyContainer" class="history-container"></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('commentsTab', this)">💬 باشترین کۆمێنتەکان</button>
        <button class="tab-btn" onclick="showTab('likesTab', this)">❤️ زۆرترین لایکەکان</button>
        <button class="tab-btn" onclick="showTab('giftsTab', this)">🎁 زۆرترین دیارییەکان</button>
        <button class="tab-btn" onclick="showTab('sharesTab', this)">↗️ زۆرترین شەیرەکان</button>
        <button class="tab-btn" onclick="showTab('searchTab', this)">🔍 گەڕان / کۆمێنتە ڕاستەوخۆکان</button>
    </div>

    <div id="commentsTab" class="tab-content active">
        <h2>Top Comments</h2>
        <div id="commentsList" class="grid-list"></div>
    </div>
    <div id="likesTab" class="tab-content">
        <h2>Top Likes</h2>
        <div id="likesList" class="grid-list"></div>
    </div>
    <div id="giftsTab" class="tab-content">
        <h2>Top Gifts (By Diamonds)</h2>
        <div id="giftsList" class="grid-list"></div>
    </div>
    <div id="sharesTab" class="tab-content">
        <h2>Top Shares</h2>
        <div id="sharesList" class="grid-list"></div>
    </div>
    <div id="searchTab" class="tab-content">
        <h2>Live Feed & Search</h2>
        <div style="display: flex; gap: 10px; width: 100%; margin-bottom: 20px;">
            <input type="text" id="searchInput" class="search-bar" style="margin-bottom: 0;" placeholder="Type a username or a word to filter the feed..." onkeyup="renderComments()" />
            <button class="tab-btn" onclick="showDuplicateComments()" style="white-space: nowrap; margin-bottom: 0;">🔁 Duplicates</button>
        </div>
        <div id="searchList"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Redirect to login page if no token is found
        if (!localStorage.getItem("tiktokAdminToken")) {
            window.location.href = "login.html";
        }
        
        const socket = io("https://tiktok-live-tracker-idnb.onrender.com");

        function saveDashboardHTML() {
            const now = new Date();
            const dateStr = now.getFullYear() + "-" + 
                            String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                            String(now.getDate()).padStart(2, '0') + "_" + 
                            String(now.getHours()).padStart(2, '0') + "-" + 
                            String(now.getMinutes()).padStart(2, '0');

            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'block');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.style.display = 'none');
            
            const clone = document.documentElement.cloneNode(true);
            const controls = clone.querySelector('#dashboardControls');
            if(controls) controls.remove();
            
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = '');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.style.display = '');
            showTab('commentsTab', document.querySelector('.tab-btn'));

            const htmlContent = "<!DOCTYPE html>\n" + clone.outerHTML;
            const blob = new Blob([htmlContent], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = `Live_Stats_${dateStr}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        let searchHistory = JSON.parse(localStorage.getItem('tiktokSearchHistory')) || [];

        function renderHistory() {
            const container = document.getElementById("historyContainer");
            if (searchHistory.length === 0) {
                container.innerHTML = "";
                return;
            }
            container.innerHTML = searchHistory.map(username => `
                <div class="history-tag">
                    <span class="name" onclick="loadFromHistory('${username}')">@${username}</span>
                    <span class="delete" onclick="deleteHistory('${username}')">✖</span>
                </div>
            `).join("");
        }

        function saveToHistory(username) {
            searchHistory = searchHistory.filter(u => u !== username);
            searchHistory.unshift(username); 
            localStorage.setItem('tiktokSearchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        function deleteHistory(username) {
            searchHistory = searchHistory.filter(u => u !== username);
            localStorage.setItem('tiktokSearchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        function loadFromHistory(username) {
            document.getElementById("usernameInput").value = username;
            startStream();
        }

        renderHistory();

        socket.on("connect", () => {
            document.getElementById("statusMessage").innerText = "🟢 Connected to Server! Ready to start.";
            document.getElementById("statusMessage").style.color = "#4cff4c";
        });
        
        socket.on("connect_error", (error) => {
            document.getElementById("statusMessage").innerText = "🔴 Server offline. Run your start script!";
            document.getElementById("statusMessage").style.color = "#ff4c4c";
        });
        
        socket.on("streamStatus", (data) => {
            document.getElementById("statusMessage").innerText = data.message;
            document.getElementById("statusMessage").style.color = data.status === "error" ? "#ff4c4c" : "#4cff4c";
        });

        socket.on("viewerUpdate", (data) => {
            document.getElementById("liveViewersBadge").innerText = data.count.toLocaleString();
        });

        function showTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            
            if(tabId === 'searchTab') renderComments();
        }

        const allComments = [];

        socket.on("newComment", (data) => {
            const now = new Date();
            const dateStr = now.getFullYear() + "-" + 
                            String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                            String(now.getDate()).padStart(2, '0');
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + 
                            String(now.getMinutes()).padStart(2, '0') + ":" + 
                            String(now.getSeconds()).padStart(2, '0');
            
            data.timestamp = `${dateStr} ${timeStr}`;
            
            allComments.push(data);
            document.getElementById("totalCommentsBadge").innerText = allComments.length.toLocaleString();
            
            if(document.getElementById('searchTab').classList.contains('active')) {
                renderComments();
            }
        });

        function renderComments() {
            const query = document.getElementById("searchInput").value.trim().toLowerCase();
            const container = document.getElementById("searchList");
            let results = allComments;

            if(query) {
                results = allComments.filter(c => {
                    const safeName = String(c.nickname || "").toLowerCase();
                    const safeUniqueId = String(c.uniqueId || "").toLowerCase();
                    const safeComment = String(c.comment || "").toLowerCase();
                    return safeName.includes(query) || safeUniqueId.includes(query) || safeComment.includes(query);
                });
            }

            if(results.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#aaa; font-size: 18px;'>No comments to display yet.</p>";
                return;
            }

            container.innerHTML = results.slice(-300).reverse().map(c => `
                <div class="comment-item">
                    <img class="avatar" src="${c.profilePictureUrl}" onerror="this.src='https://www.tiktok.com/favicon.ico'">
                    <div class="comment-text">
                        <span class="comment-name">
                            <span>${c.nickname}</span> 
                            <span style="color: #888; font-size: 13px; font-weight: normal; margin-left: 5px;">@${c.uniqueId || 'unknown'}</span>
                            <span style="color: #555; font-size: 12px; font-weight: normal; margin-left: auto; font-family: monospace;">${c.timestamp}</span>
                        </span>
                        <span style="color: #ddd; margin-top: 5px; word-break: break-word;" dir="auto">${c.comment}</span>
                    </div>
                </div>
            `).join("");
        }

        socket.on("leaderboardUpdate", (data) => {
            document.getElementById("trackedUsersBadge").innerText = data.totalUniqueUsers.toLocaleString();
            
            renderList("commentsList", data.topComments, "commentCount");
            renderList("likesList", data.topLikes, "likeCount");
            renderList("giftsList", data.topGifts, "giftCount");
            renderList("sharesList", data.topShares, "shareCount");
        });

        function getRankBadge(index) {
            if (index === 0) return "🥇";
            if (index === 1) return "🥈";
            if (index === 2) return "🥉";
            return `<span style="color: #888; font-size: 18px;">${index + 1}</span>`;
        }

        function renderList(elementId, users, countField) {
            const validUsers = users.filter(u => u[countField] > 0);
            document.getElementById(elementId).innerHTML = validUsers.map((u, index) => {
                let extraHtml = "";
                let countStyle = "margin-left: auto;"; 
                
                if (countField === "likeCount") {
                    const trueTotal = u.actualTotalLikes > u.likeCount ? u.actualTotalLikes : u.likeCount;
                    extraHtml = `<span style="color: #aaa; font-size: 14px; margin-left: auto; margin-right: 15px;">Actual: <b>${trueTotal.toLocaleString()}</b></span>`;
                    countStyle = "margin-left: 0;"; 
                }

                return `
                <div class="item">
                    <div class="rank">${getRankBadge(index)}</div>
                    <img class="avatar" src="${u.profilePictureUrl}" onerror="this.src='https://www.tiktok.com/favicon.ico'">
                    <div style="display: flex; flex-direction: column; overflow: hidden; flex-grow: 1;">
                        <span class="name" style="max-width: 100%;">${u.nickname}</span>
                        <span style="color: #888; font-size: 13px; font-weight: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">@${u.uniqueId || 'unknown'}</span>
                    </div>
                    ${extraHtml}
                    <div class="count" style="${countStyle}">${u[countField].toLocaleString()}</div>
                </div>
            `}).join("");
        }

        function startStream() {
            const username = document.getElementById("usernameInput").value.trim();
            if(username) {
                saveToHistory(username);
                
                document.getElementById("statusMessage").style.color = "#aaa";
                document.getElementById("statusMessage").innerText = "⏳ Connecting...";
                
                document.getElementById("commentsList").innerHTML = "";
                document.getElementById("likesList").innerHTML = "";
                document.getElementById("giftsList").innerHTML = "";
                document.getElementById("sharesList").innerHTML = "";
                
                allComments.length = 0; 
                document.getElementById("searchInput").value = "";
                renderComments();
                
                document.getElementById("liveViewersBadge").innerText = "0";
                document.getElementById("trackedUsersBadge").innerText = "0";
                document.getElementById("totalCommentsBadge").innerText = "0";

                socket.emit("startStream", username);
            } else {
                alert("Please enter a username first!");
            }
        }

        
    // Secret 11-Tap Admin Panel Logic
        let tapCount = 0;
        let tapTimer = null;
        document.getElementById("secretAdminTrigger").addEventListener("click", () => {
            tapCount++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000); // Resets if you stop tapping for 2 seconds
            
            if (tapCount >= 11) {
                tapCount = 0;
                socket.emit("requestAdminPanel"); // We will build this in Phase 2
                openModal("⚙️ پەنێڵی بەڕێوەبەر (Admin Panel)", "<p style='text-align:center;'>Loading admin data from server...</p>");
            }
        });

        // Prevent accidental refresh wiping out data
        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = 'Are you sure you want to leave? Your live tracking data will be lost!';
        });

        // Fetch and show Total Tracked Users
        function fetchAllUsers() {
            socket.emit("getAllUsers");
        }

        socket.on("allUsersData", (users) => {
            if(users.length === 0) return openModal("👥 Tracked Users", "<p style='color:#aaa;'>No users tracked yet.</p>");
            
            let html = `<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">` + 
            users.map(u => `
                <div class="item" style="padding: 8px;">
                    <img class="avatar" src="${u.profilePictureUrl}" onerror="this.src='https://www.tiktok.com/favicon.ico'" style="width:40px; height:40px;">
                    <div style="display: flex; flex-direction: column; overflow:hidden;">
                        <span class="name" style="font-size:14px;">${u.nickname}</span>
                        <span style="color: #888; font-size: 12px;">@${u.uniqueId}</span>
                    </div>
                    <span style="margin-left:auto; color:#fe2c55; font-size:12px; font-weight:bold;">🕒 ${u.firstSeen}</span>
                </div>
            `).join("") + `</div>`;
            openModal("👥 All Tracked Users (" + users.length + ")", html);
        });

        // Show Duplicate Comments Modal
        function showDuplicateComments() {
            const counts = {};
            const userMaps = {};
            allComments.forEach(c => {
                const text = c.comment.trim();
                if(text === "💬 [Sent a Sticker or Emote]") return; // Ignore sticker logs
                counts[text] = (counts[text] || 0) + 1;
                if(!userMaps[text]) userMaps[text] = new Set();
                userMaps[text].add("@" + c.uniqueId + " (" + c.nickname + ")");
            });
            
            const duplicates = Object.keys(counts).filter(k => counts[k] > 1).sort((a, b) => counts[b] - counts[a]);
            
            if(duplicates.length === 0) {
                openModal("🔁 Duplicate Comments", "<p style='text-align:center; color:#aaa;'>No duplicate phrases found yet.</p>");
                return;
            }
            
            let html = duplicates.map(text => {
                const usersList = Array.from(userMaps[text]).join("\\n");
                return `
                <div class="comment-item" style="flex-direction: column; cursor: pointer; transition: 0.2s; border: 1px solid transparent;" onmouseover="this.style.borderColor='#fe2c55'" onmouseout="this.style.borderColor='transparent'" onclick="alert('👥 Users who typed this:\\n\\n${usersList.replace(/'/g, "\\'")}')">
                    <div style="display: flex; justify-content: space-between; width: 100%;">
                        <span style="color: white; font-weight: bold; overflow-wrap: anywhere;">"${text}"</span>
                        <span class="count">${counts[text]} times</span>
                    </div>
                    <span style="color: #aaa; font-size: 12px; margin-top: 5px;">👆 Tap to see who typed this</span>
                </div>
                `;
            }).join("");
            
            openModal("🔁 Top Repeated Comments", html);
        }

        // Custom Popup UI Logic
        function openModal(title, contentHtml) {
            let modal = document.getElementById("customModal");
            if(!modal) {
                document.body.insertAdjacentHTML('beforeend', `
                    <div id="customModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;">
                        <div style="background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 900px; max-height: 85vh; overflow-y: auto; border: 2px solid #333; position: relative;">
                            <span onclick="document.getElementById('customModal').style.display='none'" style="position: sticky; float: right; top: 0px; cursor: pointer; font-size: 24px; color: #ff4c4c; font-weight: bold; z-index: 10;">✖</span>
                            <h2 style="margin-top: 0; text-align: left; font-size: 22px; border-bottom: 1px solid #333; padding-bottom: 10px;">${title}</h2>
                            <div id="customModalContent"></div>
                        </div>
                    </div>
                `);
                modal = document.getElementById("customModal");
            }
            document.querySelector("#customModal h2").innerText = title;
            document.getElementById("customModalContent").innerHTML = contentHtml;
            modal.style.display = "flex";
        }
    </script>
</body>
</html>
