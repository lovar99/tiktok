<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Sleek Dark Background -->
  <rect width="512" height="512" rx="110" fill="#121212" stroke="#2a2a2a" stroke-width="4"/>
  
  <!-- Outer Tech Glow Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#fe2c55" stroke-width="6" stroke-dasharray="15 10" opacity="0.4"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#25f4ee" stroke-width="2" opacity="0.2"/>

  <!-- Analytics Tracking Bar Graph (Background Layer) -->
  <g fill-opacity="0.15">
    <rect x="140" y="280" width="40" height="110" rx="6" fill="#25f4ee"/>
    <rect x="200" y="220" width="40" height="170" rx="6" fill="#fe2c55"/>
    <rect x="260" y="160" width="40" height="230" rx="6" fill="#25f4ee"/>
    <rect x="320" y="110" width="40" height="280" rx="6" fill="#fe2c55"/>
  </g>

  <!-- Real-Time Pulse/Live Analytics Wave Lines -->
  <path d="M 100 360 Q 150 240 200 320 T 300 160 T 400 220" fill="none" stroke="#25f4ee" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 100 360 Q 150 240 200 320 T 300 160 T 400 220" fill="none" stroke="#fe2c55" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="translate(-4, -4)"/>

  <!-- Glowing Dashboard Data Nodes -->
  <circle cx="200" cy="320" r="14" fill="#121212" stroke="#25f4ee" stroke-width="6"/>
  <circle cx="300" cy="160" r="16" fill="#121212" stroke="#fe2c55" stroke-width="7"/>
  <circle cx="400" cy="220" r="12" fill="#25f4ee"/>
  
  <!-- Crown / Live Broadcast Indicator Trophy Top Left -->
  <g transform="translate(110, 110)">
    <circle cx="0" cy="0" r="28" fill="#fe2c55"/>
    <path d="M -10 -6 L 0 -16 L 10 -6 L 14 -14 L 6 -10 L 0 -22 L -6 -10 L -14 -14 Z" fill="#ffffff"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#fe2c55" stroke-width="3" opacity="0.6">
      <animate attributeName="r" values="28;48;28" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
